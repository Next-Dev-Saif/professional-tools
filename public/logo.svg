<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Outer rounded square base -->
  <rect width="40" height="40" rx="10" fill="#2563EB"/>
  <!-- Forge hammer head (top flat face) -->
  <rect x="9" y="10" width="22" height="9" rx="2.5" fill="white" opacity="0.95"/>
  <!-- Hammer handle -->
  <rect x="17.5" y="19" width="5" height="12" rx="2" fill="white" opacity="0.85"/>
  <!-- Anvil base (subtle arc) -->
  <ellipse cx="20" cy="30" rx="10" ry="2.5" fill="white" opacity="0.25"/>
  <!-- Spark accent top-right -->
  <circle cx="31" cy="11" r="1.5" fill="#93C5FD"/>
  <circle cx="34" cy="14" r="1" fill="#BFDBFE"/>
</svg>
